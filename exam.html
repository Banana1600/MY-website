<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ข้อสอบ | ครู Banana</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="nav-container">
      <div class="logo">
        ครู <span>Banana</span>
      </div>

      <nav>
        <a href="index.html">หน้าแรก</a>
        <a href="lessons.html">บทเรียน</a>
        <a href="exam.html" class="active">ข้อสอบ</a>
        <a href="teaching.html">แผนการสอน</a>
        <a href="media.html">สื่อการสอน</a>
      </nav>
    </div>
  </header>

  <!-- PAGE -->
  <section class="container">

    <div class="page-header">
      <h1>📝 ระบบข้อสอบ</h1>
      <p>จัดการข้อสอบกลางภาคและปลายภาค</p>
    </div>

    <div class="action-bar">
      <select id="courseSelect"></select>

      <select id="examType">
        <option value="กลางภาค">กลางภาค</option>
        <option value="ปลายภาค">ปลายภาค</option>
      </select>

      <input id="link" placeholder="ลิงก์ข้อสอบ Google Drive">

      <button class="btn-primary" onclick="addExam()">บันทึก</button>
    </div>

    <div id="list" class="card-grid"></div>

  </section>

  <script src="app.js"></script>
  <script>
    let exams = JSON.parse(localStorage.getItem("exams")) || [];

    function loadCourses() {
      const courseSelect = document.getElementById("courseSelect");
      courseSelect.innerHTML = "";

      if (courses.length === 0) {
        courseSelect.innerHTML = `<option value="">ยังไม่มีรายวิชา</option>`;
        return;
      }

      courses.forEach(c => {
        courseSelect.innerHTML += `<option value="${c.code} - ${c.name}">${c.code} - ${c.name}</option>`;
      });
    }

    function addExam() {
      const course = document.getElementById("courseSelect").value;
      const type = document.getElementById("examType").value;
      const link = document.getElementById("link").value.trim();

      if (!course || !link) {
        alert("กรุณาเลือกวิชาและใส่ลิงก์ข้อสอบ");
        return;
      }

      exams.push({ course, type, link });
      localStorage.setItem("exams", JSON.stringify(exams));

      document.getElementById("link").value = "";
      renderExam();
    }

    function deleteExam(index) {
      if (!confirm("ต้องการลบข้อสอบนี้หรือไม่")) return;
      exams.splice(index, 1);
      localStorage.setItem("exams", JSON.stringify(exams));
      renderExam();
    }

    function renderExam() {
      const list = document.getElementById("list");
      let html = "";

      if (exams.length === 0) {
        html = `<div class="empty">ยังไม่มีข้อสอบ</div>`;
      } else {
        exams.forEach((e, index) => {
          html += `
            <div class="card">
              <div class="card-title">${e.course}</div>
              <div class="tag">${e.type}</div>

              <div class="btn-group">
                <a href="${e.link}" target="_blank" class="btn-primary">เปิดข้อสอบ</a>
                <button class="btn-delete" onclick="deleteExam(${index})">ลบ</button>
              </div>
            </div>
          `;
        });
      }

      list.innerHTML = html;
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadCourses();
      renderExam();
    });
  </script>

</body>
</html>
