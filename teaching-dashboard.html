<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบจัดการการสอน | ครู Banana</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<!-- FullCalendar -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<!-- ICON -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

</head>


<body class="banana-bg">


<!-- NAVBAR -->

<header class="navbar">

<div class="nav-container">

<div class="logo">ครู <span>Banana</span></div>

<nav>

<a href="index.html">หน้าแรก</a>
<a href="lessons.html">บทเรียน</a>
<a href="projects.html">โครงงาน</a>
<a href="teaching-dashboard.html" class="active">ระบบแผนการสอน</a>

</nav>

</div>

</header>



<!-- SECTION รายวิชา -->

<section class="container lessons">

<h1>📚 ระบบจัดการการสอน</h1>

<p class="intro">
เพิ่มรายวิชา แผนการสอน ตารางสอน และลิงก์เอกสาร Google Drive
</p>

<button class="btn-primary" id="addCourseBtn">
➕ เพิ่มรายวิชา
</button>

<div id="courseList" class="lesson-grid"></div>

</section>



<!-- CALENDAR -->

<section class="container">

<h2>📅 ตารางสอน</h2>

<div id="calendar"></div>

</section>



<!-- EXPORT -->

<section class="container">

<h2>📤 Export ข้อมูล</h2>

<div class="export-buttons">

<button class="btn-outline" onclick="exportPDF()">PDF</button>

<button class="btn-outline" onclick="exportCSV()">Excel</button>

<button class="btn-outline" onclick="exportDOC()">Word</button>

</div>

</section>



<!-- MODAL เพิ่มรายวิชา -->

<div id="courseModal" class="modal">

<div class="modal-content">

<h2>เพิ่มรายวิชา</h2>

<input class="form-input" id="courseCode" placeholder="รหัสวิชา">

<input class="form-input" id="courseName" placeholder="ชื่อรายวิชา">

<input class="form-input" id="courseTeacher" placeholder="ผู้สอน">

<textarea class="form-input" id="coursePlan" placeholder="แผนการสอน"></textarea>

<input class="form-input" id="courseDrive" placeholder="ลิงก์ Google Drive">

<label class="upload-label">
📄 อัปโหลดไฟล์แผนการสอน
</label>

<input type="file"
id="courseFile"
accept=".pdf,.doc,.docx">


<div class="modal-buttons">

<button id="saveCourseBtn" class="btn-primary">
บันทึก
</button>

<button id="cancelCourseBtn" class="btn-outline">
ยกเลิก
</button>

</div>

</div>

</div>



<script src="dashboard.js"></script>

</body>

</html>
