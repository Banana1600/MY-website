<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายวิชา | ครู Banana</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="nav-container">
      <div class="logo">
        ครู <span>Banana</span>
      </div>

      <nav>
        <a href="index.html">หน้าแรก</a>
        <a href="lessons.html" class="active">บทเรียน</a>
        <a href="exam.html">ข้อสอบ</a>
        <a href="teaching.html">แผนการสอน</a>
        <a href="media.html">สื่อการสอน</a>
      </nav>
    </div>
  </header>

  <!-- PAGE -->
  <section class="container">

    <div class="page-header">
      <h1>📚 รายวิชา</h1>
      <p>จัดการรายวิชาและสัปดาห์การเรียน</p>
    </div>

    <div class="action-bar">
      <button class="btn-primary" onclick="addCourse()">➕ เพิ่มรายวิชา</button>
    </div>

    <div id="lessonContainer" class="card-grid"></div>

  </section>

  <script src="app.js"></script>
  <script>
    function renderLessons() {
      const container = document.getElementById("lessonContainer");
      let html = "";

      if (courses.length === 0) {
        html = `<div class="empty">ยังไม่มีรายวิชา</div>`;
      } else {
        courses.forEach((c, i) => {
          html += `
            <div class="card">
              <div class="card-title">${c.code} - ${c.name}</div>
              <div class="tag">${c.level}</div>

              <div class="btn-group">
                <button class="btn-primary" onclick="editCourse(${i})">แก้ไข</button>
                <button class="btn-delete" onclick="deleteCourse(${i})">ลบ</button>
              </div>
            </div>
          `;
        });
      }

      container.innerHTML = html;
    }

    function addCourse() {
      const code = prompt("รหัสวิชา");
      if (!code) return;

      const name = prompt("ชื่อวิชา");
      if (!name) return;

      const level = prompt("ระดับชั้น เช่น ปวช.1 / ปวช.2 / ปวส.1");
      if (!level) return;

      courses.push({ code, name, level });
      saveCourses();
      renderLessons();
    }

    function editCourse(index) {
      const current = courses[index];

      const code = prompt("แก้ไขรหัสวิชา", current.code);
      if (!code) return;

      const name = prompt("แก้ไขชื่อวิชา", current.name);
      if (!name) return;

      const level = prompt("แก้ไขระดับชั้น", current.level);
      if (!level) return;

      courses[index] = { ...current, code, name, level };
      saveCourses();
      renderLessons();
    }

    function deleteCourse(index) {
      if (!confirm("ต้องการลบรายวิชานี้หรือไม่")) return;
      courses.splice(index, 1);
      saveCourses();
      renderLessons();
    }

    document.addEventListener("DOMContentLoaded", renderLessons);
  </script>

</body>
</html>
